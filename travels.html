<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travels — Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --phoenix:      #C8721A;
      --phoenix-light:#E8924A;
      --dark:         #121212;
      --surface:      #1C1C1C;
      --surface2:     #242424;
      --border:       #2E2E2E;
      --text:         #E8E0D8;
      --text-muted:   #8A8078;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 48px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--phoenix-light); }
    .back-link .arrow { font-size: 1rem; }

    .topbar-sep {
      color: var(--border);
      font-size: 1.1rem;
    }

    .topbar-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 56px 48px 40px;
      border-bottom: 1px solid var(--border);
      max-width: 960px;
    }

    .eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--phoenix);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 14px;
    }

    .page-header p {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.8;
      max-width: 560px;
    }

    /* ── FILTER TABS ── */
    .filter-bar {
      padding: 28px 48px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ftab {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .ftab:hover, .ftab.active {
      background: var(--phoenix);
      border-color: var(--phoenix);
      color: #fff;
    }

    /* ── GRID ── */
    .grid-wrap {
      padding: 32px 48px 80px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .photo-card {
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
    }
    .photo-card:hover {
      transform: translateY(-3px);
      border-color: var(--phoenix);
    }

    .photo-card .thumb {
      aspect-ratio: 4/3;
      overflow: hidden;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--border);
    }

    .photo-card .thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }
    .photo-card:hover .thumb img { transform: scale(1.04); }

    .photo-card .caption {
      padding: 12px 14px;
    }
    .photo-card .caption .place {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
    }
    .photo-card .caption .date {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 32px;
    }
    #lightbox.open { display: flex; }

    #lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 8px;
      object-fit: contain;
    }

    #lightbox-caption {
      color: var(--text-muted);
      font-size: 0.88rem;
      text-align: center;
    }

    #lightbox-close {
      position: absolute; top: 20px; right: 28px;
      font-size: 1.8rem; color: var(--text-muted);
      background: none; border: none; cursor: pointer;
      transition: color 0.15s;
    }
    #lightbox-close:hover { color: var(--text); }

    /* prev / next */
    .lb-nav {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 1.4rem;
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .lb-nav:hover { border-color: var(--phoenix); color: var(--phoenix-light); }
    #lb-prev { left: 20px; }
    #lb-next { right: 20px; }

    @media (max-width: 600px) {
      .topbar, .page-header, .filter-bar, .grid-wrap { padding-left: 20px; padding-right: 20px; }
      .page-header h1 { font-size: 1.8rem; }
      .lb-nav { display: none; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a class="back-link" href="../index.html">
    <span class="arrow">←</span> Back
  </a>
  <span class="topbar-sep">/</span>
  <span class="topbar-title">Travels</span>
</div>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="eyebrow">Gallery</div>
  <h1>Travels</h1>
  <p>Places visited, landscapes encountered, and moments worth keeping. Click any photo to view it full size.</p>
</div>

<!-- FILTER TABS -->
<div class="filter-bar">
  <button class="ftab active" onclick="filter('all', this)">All</button>
  <button class="ftab" onclick="filter('europe', this)">Europe</button>
  <button class="ftab" onclick="filter('asia', this)">Asia</button>
  <button class="ftab" onclick="filter('other', this)">Other</button>
</div>

<!-- PHOTO GRID -->
<div class="grid-wrap" id="grid">

  <!-- Replace the placeholder divs below with real photos.
       To add a photo:
         1. Put the image in galleries/images/travels/
         2. Replace the emoji thumb with:
            <img src="images/travels/your-photo.jpg" alt="Description" />
         3. Update place and date in .caption
         4. Set data-region to match your filter tabs
  -->

  <div class="photo-card" data-region="europe" onclick="openLb(this, 'Prague, Czech Republic', 'June 2023')">
    <div class="thumb">🏰</div>
    <div class="caption">
      <div class="place">Prague</div>
      <div class="date">Czech Republic · June 2023</div>
    </div>
  </div>

  <div class="photo-card" data-region="europe" onclick="openLb(this, 'Vienna, Austria', 'March 2022')">
    <div class="thumb">🎭</div>
    <div class="caption">
      <div class="place">Vienna</div>
      <div class="date">Austria · March 2022</div>
    </div>
  </div>

  <div class="photo-card" data-region="europe" onclick="openLb(this, 'Dolomites, Italy', 'August 2022')">
    <div class="thumb">🏔️</div>
    <div class="caption">
      <div class="place">Dolomites</div>
      <div class="date">Italy · August 2022</div>
    </div>
  </div>

  <div class="photo-card" data-region="asia" onclick="openLb(this, 'Kyoto, Japan', 'April 2019')">
    <div class="thumb">⛩️</div>
    <div class="caption">
      <div class="place">Kyoto</div>
      <div class="date">Japan · April 2019</div>
    </div>
  </div>

  <div class="photo-card" data-region="other" onclick="openLb(this, 'Somewhere beautiful', '2021')">
    <div class="thumb">🌅</div>
    <div class="caption">
      <div class="place">Your destination</div>
      <div class="date">Year</div>
    </div>
  </div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightbox-close" onclick="closeLb()">✕</button>
  <button class="lb-nav" id="lb-prev" onclick="stepLb(-1)">‹</button>
  <img id="lb-img" src="" alt="" />
  <div id="lightbox-caption"></div>
  <button class="lb-nav" id="lb-next" onclick="stepLb(1)">›</button>
</div>

<script>
  // ── FILTER ──
  function filter(region, btn) {
    document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.photo-card').forEach(card => {
      card.style.display = (region === 'all' || card.dataset.region === region) ? '' : 'none';
    });
  }

  // ── LIGHTBOX ──
  let cards = [], lbIndex = 0;

  function visibleCards() {
    return [...document.querySelectorAll('.photo-card')].filter(c => c.style.display !== 'none');
  }

  function openLb(card, place, date) {
    const img = card.querySelector('img');
    if (!img) return; // placeholder — add real images first
    cards = visibleCards();
    lbIndex = cards.indexOf(card);
    showLb();
  }

  function showLb() {
    const card = cards[lbIndex];
    const img = card.querySelector('img');
    if (!img) return;
    document.getElementById('lb-img').src = img.src;
    document.getElementById('lb-img').alt = img.alt;
    document.getElementById('lightbox-caption').textContent =
      card.querySelector('.place').textContent + ' · ' +
      card.querySelector('.date').textContent;
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLb() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lb-img').src = '';
  }

  function stepLb(dir) {
    lbIndex = (lbIndex + dir + cards.length) % cards.length;
    showLb();
  }

  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLb();
  });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowRight') stepLb(1);
    if (e.key === 'ArrowLeft') stepLb(-1);
  });
</script>
</body>
</html>
